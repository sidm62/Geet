<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Restaurant-guide</title>
  <link rel="stylesheet" href="restaurant.css">
  <script src="main.js" type="module" defer></script>
</head>
<body>

<header>
  <h1>Student Restaurant-guide</h1>
  <nav>
    <p>Your daily companion for finding the best student meals across Finnish universities.</p>
  </nav>
</header>

<main>
  <section id="register-section">
    <h2>Create an Account</h2>
    <form id="register-form" action="Restaurant.html" method="GET">
      <div class="form-group">
        <label for="register-username">Username</label>
        <input type="text" id="register-username" name="username" required minlength="3">
      </div>
      <div class="form-group">
        <label for="register-email">Email</label>
        <input type="email" id="register-email" name="email" required>
      </div>
      <div class="form-group">
        <label for="register-password">Password</label>
        <input type="password" id="register-password" name="password" required>
      </div>

      <button type="submit" id="register-submit">Register</button>

    </form>
  </section>


</dialog>
</main>
</body>
</html>
